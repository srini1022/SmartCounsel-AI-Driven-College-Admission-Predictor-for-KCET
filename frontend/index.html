<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CET College Predictor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background-image">
    <div class="container">

      <h1>SmartCounsel AI-Driven College Admission Predictor for KCET</h1>
      <form id="uploadForm">
        
        <!-- Category Dropdown -->
        <label for="category">Select Category:</label>
        <select id="category" name="category" required>
          <option value="1G">1G</option>
          <option value="1K">1K</option>
          <option value="1R">1R</option>
          <option value="2AG">2AG</option>
          <option value="2AK">2AK</option>
          <option value="2AR">2AR</option>
          <option value="2BG">2BG</option>
          <option value="2BK">2BK</option>
          <option value="2BR">2BR</option>
          <option value="3AG">3AG</option>
          <option value="3AK">3AK</option>
          <option value="3AR">3AR</option>
          <option value="3BG">3BG</option>
          <option value="3BK">3BK</option>
          <option value="3BR">3BR</option>
          <option value="GM">GM</option>
          <option value="GMK">GMK</option>
          <option value="GMR">GMR</option>
          <option value="SCG">SCG</option>
          <option value="SCK">SCK</option>
          <option value="SCR">SCR</option>
          <option value="STG">STG</option>
          <option value="STK">STK</option>
          <option value="STR">STR</option>
        </select>

        <!-- CET Rank -->
        <label for="rank">Enter CET Rank:</label>
        <input type="number" id="rank" name="rank" required>

        <!-- Top N Results -->
        <label for="top_n">Show Top N Colleges:</label>
        <input type="number" id="top_n" name="top_n" value="50" required>

        <button type="submit">Find Colleges</button>
      </form>

      <!-- Results Section -->
      <div id="results">
        <!-- Table will be injected here by app.js -->
      </div>

    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
